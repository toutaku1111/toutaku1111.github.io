<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>3x3x4X Rulebook</title>
  <style>
    :root {
      --bg: #f4f1ea;
      --ink: #1c2024;
      --muted: #63706d;
      --panel: #fffaf0;
      --line: #d9d0bf;
      --focus: #2d5a8a;
      color-scheme: light;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: linear-gradient(135deg, rgba(182, 64, 74, 0.08), transparent 35%), linear-gradient(315deg, rgba(16, 115, 125, 0.08), transparent 42%), var(--bg);
      color: var(--ink);
      font-family: "Segoe UI", "Yu Gothic UI", Meiryo, sans-serif;
    }
    .shell {
      width: min(1040px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 22px 0 36px;
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      margin-bottom: 14px;
    }
    h1 { margin: 0; font-size: clamp(1.5rem, 2.3vw, 2.2rem); line-height: 1.1; }
    .subtitle { margin: 4px 0 0; color: var(--muted); font-weight: 800; }
    .button-link {
      display: inline-grid;
      place-items: center;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      color: var(--ink);
      padding: 0 12px;
      text-decoration: none;
      font-weight: 800;
    }
    .button-link:hover { border-color: var(--focus); }
    .rulebook-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 250, 240, 0.9);
      overflow: hidden;
    }
    .rulebook-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      border-bottom: 1px solid var(--line);
      padding: 12px 14px;
    }
    .rulebook-head span { color: var(--muted); font-size: 0.85rem; font-weight: 800; }
    .rulebook-body {
      margin: 0;
      padding: 18px;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: "Yu Gothic UI", Meiryo, sans-serif;
      font-size: 0.94rem;
      line-height: 1.65;
    }
    @media (max-width: 640px) {
      .top-bar, .rulebook-head { align-items: stretch; flex-direction: column; }
      .button-link { width: 100%; }
    }
  </style>
</head>
